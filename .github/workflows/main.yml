name: RDP Permanent

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 350
    
    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force
          
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389
          
          Restart-Service -Name TermService -Force
          Write-Host "вң… RDP configured"

      - name: Create RDP User with PERMANENT Password
        run: |
          $password = "Ramprakash#1122"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          $userExists = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue
          if ($userExists) {
              Set-LocalUser -Name "RDP" -Password $securePass
              Write-Host "вң… Password updated"
          } else {
              New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member "RDP"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
              Write-Host "вң… User created"
          }
          
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          echo "RDP_USER=RDP" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force
          Write-Host "вң… Tailscale installed"

      - name: Establish Tailscale Connection
        run: |
          $hostname = "my-rdp-server"
          
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=$hostname `
            --accept-routes `
            --accept-dns=false `
            --reset
          
          # Wait for IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 20) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null
              Start-Sleep -Seconds 3
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "вқҢ Tailscale IP not assigned"
              exit 1
          }
          
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Get MagicDNS and Disable Firewall
        run: |
          # Get exact MagicDNS
          $status = & "$env:ProgramFiles\Tailscale\tailscale.exe" status --json 2>$null | ConvertFrom-Json
          $magicDNS = $status.Self.DNSName.TrimEnd('.')
          
          # Also get from status output
          $statusText = & "$env:ProgramFiles\Tailscale\tailscale.exe" status
          Write-Host "Tailscale Status:"
          Write-Host $statusText
          
          # Extract MagicDNS
          if ($magicDNS) {
              echo "MAGICDNS=$magicDNS" >> $env:GITHUB_ENV
          } else {
              # Fallback
              echo "MAGICDNS=my-rdp-server.psram123.ts.net" >> $env:GITHUB_ENV
          }
          
          # Disable firewall completely
          netsh advfirewall set allprofiles state off
          
          # Restart RDP service
          net stop TermService
          net start TermService
          
          Write-Host "вң… MagicDNS: $magicDNS"
          Write-Host "вң… IP: $env:TAILSCALE_IP"

      - name: Display Connection Details
        run: |
          Write-Host ""
          Write-Host "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
          Write-Host "в•‘     рҹ”җ PERMANENT RDP CONNECTION DETAILS            в•‘"
          Write-Host "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"
          Write-Host ""
          Write-Host "рҹ“Қ USE THIS IP (WORKING):"
          Write-Host "   $env:TAILSCALE_IP"
          Write-Host ""
          Write-Host "рҹ“Қ MagicDNS (TRY THESE):"
          Write-Host "   $env:MAGICDNS"
          Write-Host "   my-rdp-server.psram123.ts.net"
          Write-Host "   my-rdp-server.psram123"
          Write-Host ""
          Write-Host "рҹ‘Ө Username: RDP"
          Write-Host "рҹ”‘ Password: Ramprakash#1122"
          Write-Host ""
          Write-Host "в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—"
          Write-Host "в•‘  вң… IP is 100% WORKING right now!                  в•‘"
          Write-Host "в•‘  рҹ’Ў Save the IP for this session                   в•‘"
          Write-Host "в•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ"

      - name: Maintain Connection
        run: |
          Write-Host "рҹҡҖ RDP ACTIVE - Current IP: $env:TAILSCALE_IP"
          Write-Host "рҹ‘Ө Username: RDP"
          Write-Host "рҹ”‘ Password: Ramprakash#1122"
          
          while ($true) {
              Write-Host "[$(Get-Date)] вң… RDP Active - IP: $env:TAILSCALE_IP"
              Start-Sleep -Seconds 60
          }
