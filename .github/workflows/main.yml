name: RDP Permanent - Fixed Hostname

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 350
    
    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force
          
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389
          
          Restart-Service -Name TermService -Force

      - name: Create RDP User with PERMANENT Password
        run: |
          $password = "Ramprakash#1122"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          
          $userExists = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue
          if ($userExists) {
              Set-LocalUser -Name "RDP" -Password $securePass
          } else {
              New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member "RDP"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          }
          
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          echo "RDP_USER=RDP" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Establish Tailscale Connection (FIXED HOSTNAME)
        run: |
          # 🔒 FIXED HOSTNAME - NEVER CHANGES!
          $hostname = "my-rdp-server"
          
          Write-Host "🔗 Connecting with FIXED hostname: $hostname"
          
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=$hostname `
            --accept-routes `
            --accept-dns=false `
            --reset
          
          # Get IP
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 20) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4 2>$null
              Start-Sleep -Seconds 3
              $retries++
          }
          
          if (-not $tsIP) {
              Write-Error "❌ Tailscale IP not assigned"
              exit 1
          }
          
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV
          
          # Get MagicDNS
          $status = & "$env:ProgramFiles\Tailscale\tailscale.exe" status --json 2>$null | ConvertFrom-Json
          $magicDNS = $status.Self.DNSName.TrimEnd('.')
          
          if ($magicDNS) {
              echo "MAGICDNS=$magicDNS" >> $env:GITHUB_ENV
          } else {
              echo "MAGICDNS=$hostname.tail8f2f4d.ts.net" >> $env:GITHUB_ENV
          }
          
          Write-Host ""
          Write-Host "✅ PERMANENT MagicDNS: $magicDNS"
          Write-Host "✅ Current IP: $tsIP (changes each run)"

      - name: Disable Firewall and Restart RDP
        run: |
          netsh advfirewall set allprofiles state off
          net stop TermService
          net start TermService
          Start-Sleep -Seconds 5
          Write-Host "✅ RDP ready"

      - name: Display PERMANENT Connection Details
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════╗"
          Write-Host "║       🔐 PERMANENT RDP - ALWAYS THE SAME ADDRESS!      ║"
          Write-Host "╚══════════════════════════════════════════════════════════╝"
          Write-Host ""
          Write-Host "📍 PERMANENT MagicDNS (NEVER CHANGES!):"
          Write-Host "   $env:MAGICDNS"
          Write-Host ""
          Write-Host "📍 Temporary IP (CHANGES each run):"
          Write-Host "   $env:TAILSCALE_IP"
          Write-Host ""
          Write-Host "👤 Username: RDP"
          Write-Host "🔑 Password: Ramprakash#1122"
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════╗"
          Write-Host "║  ✅ SAVE THIS MagicDNS - USE IT FOREVER!              ║"
          Write-Host "║  🔄 Auto-restarts every 5 hours                       ║"
          Write-Host "║  📍 SAME address works EVERY TIME!                   ║"
          Write-Host "╚══════════════════════════════════════════════════════════╝"

      - name: Maintain Connection
        run: |
          Write-Host "🚀 RDP ACTIVE - PERMANENT ADDRESS: $env:MAGICDNS"
          Write-Host "👤 Username: RDP"
          Write-Host "🔑 Password: Ramprakash#1122"
          Write-Host ""
          
          while ($true) {
              Write-Host "[$(Get-Date)] ✅ RDP Active - $env:MAGICDNS"
              Start-Sleep -Seconds 60
          }
